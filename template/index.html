<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harness Control Plane</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #d2a8ff;
    --accent4: #f0883e;
    --accent5: #f778ba;
    --accent6: #79c0ff;
    --red: #f85149;
    --tag-bg: rgba(88,166,255,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .search-container { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 16px 24px; }
  .search-wrapper { max-width: 800px; margin: 0 auto; position: relative; }
  .search-wrapper input { width: 100%; padding: 14px 20px 14px 48px; background: var(--surface); border: 1px solid var(--border); border-radius: 9999px; color: var(--text); font-size: 16px; outline: none; transition: border-color .2s; }
  .search-wrapper input:focus { border-color: var(--accent); }
  .search-wrapper input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 18px; }
  .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-top: 8px; max-height: 400px; overflow-y: auto; display: none; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  .search-results.active { display: block; }
  .search-result-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .15s; }
  .search-result-item:hover { background: var(--surface2); }
  .search-result-item:last-child { border-bottom: none; }
  .sr-name { font-weight: 600; color: var(--accent); font-size: 14px; }
  .sr-type { font-size: 11px; padding: 2px 8px; border-radius: 6px; margin-left: 8px; font-weight: 500; }
  .sr-desc { color: var(--text-muted); font-size: 13px; margin-top: 4px; line-height: 1.4; }
  .sr-no-match { padding: 20px; text-align: center; color: var(--text-muted); }
  .sr-no-match strong { color: var(--accent4); display: block; margin-top: 8px; font-size: 14px; }

  .header { text-align: center; padding: 32px 24px 16px; }
  .header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: var(--text-muted); margin-top: 8px; font-size: 14px; }

  .stats { display: flex; justify-content: center; gap: 32px; padding: 0 24px 24px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-num { font-size: 32px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  .filters { display: flex; justify-content: center; gap: 8px; padding: 0 24px 16px; flex-wrap: wrap; }
  .filter-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; font-size: 13px; transition: all .2s; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--tag-bg); }

  .anchor-nav { display: flex; justify-content: center; gap: 6px; padding: 0 24px 24px; flex-wrap: wrap; }
  .anchor-link { padding: 5px 12px; border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; transition: all .2s; border: none; text-decoration: none; }
  .anchor-link:hover { color: var(--text); background: var(--surface); }

  .categories { max-width: 1400px; margin: 0 auto; padding: 0 24px 48px; }
  .category { margin-bottom: 32px; }
  .category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; cursor: pointer; user-select: none; }
  .category-header h2 { font-size: 18px; font-weight: 600; }
  .category-count { font-size: 13px; color: var(--text-muted); background: var(--surface); padding: 2px 10px; border-radius: 12px; }
  .category-toggle { color: var(--text-muted); transition: transform .2s; }
  .category.collapsed .category-toggle { transform: rotate(-90deg); }
  .category.collapsed .cards { display: none; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; padding-bottom: 40px; transition: all .2s; cursor: default; position: relative; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(88,166,255,.08); }
  .card.orchestrator { border-left: 3px solid var(--accent3); }
  .card.highlight { border-color: var(--accent); background: rgba(88,166,255,.06); }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .card-name { font-weight: 600; font-size: 14px; color: var(--accent); font-family: 'SF Mono', 'Fira Code', monospace; }
  .card-badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .badge-skill { background: rgba(63,185,80,.15); color: var(--accent2); }
  .badge-agent { background: rgba(210,168,255,.15); color: var(--accent3); }
  .badge-mcp { background: rgba(240,136,62,.15); color: var(--accent4); }
  .badge-gsd { background: rgba(121,192,255,.15); color: var(--accent6); }
  .badge-orchestrator { background: rgba(247,120,186,.15); color: var(--accent5); }
  .card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: var(--tag-bg); color: var(--accent); }
  .card-deps { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .card-deps-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .dep-link { font-size: 12px; color: var(--accent3); cursor: pointer; margin-right: 8px; font-family: 'SF Mono', 'Fira Code', monospace; }
  .dep-link:hover { text-decoration: underline; }
  .card-used-by { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .card-used-by .card-deps-label { color: var(--accent5); }
  .used-by-link { font-size: 12px; color: var(--accent5); cursor: pointer; margin-right: 8px; font-family: 'SF Mono', 'Fira Code', monospace; }
  .used-by-link:hover { text-decoration: underline; }

  /* Provider icons */
  .card-providers { position: absolute; bottom: 10px; right: 12px; display: flex; gap: 4px; }
  .provider-icon { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: .75; transition: opacity .2s; cursor: default; overflow: hidden; }
  .provider-icon:hover { opacity: 1; }
  .provider-icon svg { width: 10px; height: 10px; }
  .provider-icon img { width: 16px; height: 16px; border-radius: 50%; }
  .badge-instruction { background: rgba(121,192,255,.15); color: var(--accent6); }
  .badge-rule { background: rgba(0,212,170,.15); color: #00d4aa; }

  /* Connect button */
  .connect-btn { position: absolute; top: 12px; right: 12px; width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); cursor: pointer; font-size: 14px; display: none; align-items: center; justify-content: center; transition: all .2s; z-index: 2; }
  .connect-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--tag-bg); }
  .serve-mode .connect-btn { display: flex; }
  .card-top { padding-right: 0; }
  .serve-mode .card-top { padding-right: 34px; }

  /* Connect modal */
  .connect-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; background: rgba(0,0,0,.6); align-items: center; justify-content: center; }
  .connect-modal.active { display: flex; }
  .connect-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 400px; max-width: 90vw; box-shadow: 0 16px 48px rgba(0,0,0,.5); }
  .connect-panel h3 { font-size: 16px; margin-bottom: 4px; }
  .connect-panel .connect-subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }
  .connect-tool-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; background: var(--bg); }
  .connect-tool-info { display: flex; align-items: center; gap: 10px; }
  .connect-tool-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .connect-tool-icon svg { width: 18px; height: 18px; }
  .connect-tool-icon img { width: 32px; height: 32px; border-radius: 50%; }
  .connect-tool-name { font-size: 14px; font-weight: 500; }
  .connect-tool-status { font-size: 11px; color: var(--text-muted); }
  .connect-action-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 12px; transition: all .15s; }
  .connect-action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .connect-action-btn.connected { border-color: var(--accent2); color: var(--accent2); }
  .connect-action-btn.connected:hover { border-color: var(--red); color: var(--red); }
  .connect-action-btn:disabled { opacity: .4; cursor: default; }
  .connect-close { margin-top: 16px; text-align: center; }
  .connect-close button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; }
  .connect-close button:hover { color: var(--text); }
  .connect-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent2); border-radius: 8px; padding: 10px 20px; color: var(--accent2); font-size: 13px; z-index: 300; display: none; box-shadow: 0 4px 16px rgba(0,0,0,.3); }
  .connect-toast.active { display: block; }

  .footer { text-align: center; padding: 24px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 12px; }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>

// Build reverse deps
const USED_BY = {};
DATA.forEach(d => {
  if (d.deps) d.deps.forEach(dep => {
    if (!USED_BY[dep]) USED_BY[dep] = [];
    if (!USED_BY[dep].includes(d.name)) USED_BY[dep].push(d.name);
  });
});

function catSlug(cat) { return cat.toLowerCase().replace(/[^a-z0-9]+/g, '-'); }

function render(filter) {
  filter = filter || 'all';
  const container = document.getElementById('categoriesContainer');
  container.innerHTML = '';

  let counts = { skill: 0, agent: 0, mcp: 0 };
  DATA.forEach(d => { if (counts[d.type] !== undefined) counts[d.type]++; });
  document.getElementById('statSkills').textContent = counts.skill;
  document.getElementById('statAgents').textContent = counts.agent;
  document.getElementById('statMcp').textContent = counts.mcp;

  const filtered = filter === 'all' ? DATA :
    filter === 'orchestrator' ? DATA.filter(d => d.isOrchestrator) :
    DATA.filter(d => d.type === filter);

  const grouped = {};
  filtered.forEach(d => {
    if (!grouped[d.cat]) grouped[d.cat] = [];
    grouped[d.cat].push(d);
  });

  // Anchor nav
  const anchorNav = document.getElementById('anchorNav');
  const visibleCats = CAT_ORDER.filter(cat => grouped[cat]);
  anchorNav.innerHTML = visibleCats.map(cat =>
    '<a class="anchor-link" href="#cat-' + catSlug(cat) + '" onclick="scrollToCat(event, \'' + catSlug(cat) + '\')" style="color:' + (CAT_COLORS[cat] || '#8b949e') + '">' + cat + '</a>'
  ).join('');

  CAT_ORDER.forEach(cat => {
    if (!grouped[cat]) return;
    const items = grouped[cat];
    const section = document.createElement('div');
    section.className = 'category';
    section.id = 'cat-' + catSlug(cat);
    section.innerHTML =
      '<div class="category-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
        '<span class="category-toggle">&#9660;</span>' +
        '<h2 style="color:' + (CAT_COLORS[cat] || '#e6edf3') + '">' + cat + '</h2>' +
        '<span class="category-count">' + items.length + '</span>' +
      '</div>' +
      '<div class="cards">' + items.map(renderCard).join('') + '</div>';
    container.appendChild(section);
  });
}

function renderCard(d) {
  var BADGE_MAP = { skill: 'badge-skill', agent: 'badge-agent', mcp: 'badge-mcp', gsd: 'badge-gsd', instruction: 'badge-instruction', rule: 'badge-rule' };
  var bc = d.isOrchestrator ? 'badge-orchestrator' : (BADGE_MAP[d.type] || 'badge-skill');
  var bl = d.isOrchestrator ? 'orchestrator' : d.type;
  var cc = d.isOrchestrator ? 'card orchestrator' : 'card';

  var depsHtml = d.deps && d.deps.length ?
    '<div class="card-deps"><div class="card-deps-label">Uses</div>' +
    d.deps.map(function(dep) { return '<span class="dep-link" onclick="highlightCard(\'' + dep + '\')">' + dep + '</span>'; }).join('') +
    '</div>' : '';

  var usedBy = USED_BY[d.name] || [];
  var usedByHtml = usedBy.length ?
    '<div class="card-used-by"><div class="card-deps-label">Used by</div>' +
    usedBy.map(function(u) { return '<span class="used-by-link" onclick="highlightCard(\'' + u + '\')">' + u + '</span>'; }).join('') +
    '</div>' : '';

  // Provider icons (SVG logos)
  var providers = d.providers || [];
  var providerHtml = providers.length ?
    '<div class="card-providers">' +
    providers.map(function(p) {
      var pi = PROVIDER_ICONS[p];
      if (!pi) return '';
      return '<span class="provider-icon" title="' + pi.label + '">' + pi.icon + '</span>';
    }).join('') +
    '</div>' : '';

  // Connect button (only visible in serve mode)
  var connectBtn = '<button class="connect-btn" onclick="openConnectModal(\'' + d.name + '\', \'' + d.type + '\')" title="Connect to other tools">+</button>';

  return '<div class="' + cc + '" id="card-' + d.name + '" data-name="' + d.name + '">' +
    connectBtn +
    '<div class="card-top">' +
      '<span class="card-name">/' + d.name + '</span>' +
      '<span class="card-badge ' + bc + '">' + bl + '</span>' +
    '</div>' +
    '<div class="card-desc">' + (d.desc || '') + '</div>' +
    '<div class="card-tags">' + (d.tags || []).map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' +
    depsHtml + usedByHtml + providerHtml +
  '</div>';
}

function scrollToCat(e, slug) {
  e.preventDefault();
  var el = document.getElementById('cat-' + slug);
  if (el) { el.classList.remove('collapsed'); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
}

function highlightCard(name) {
  document.querySelectorAll('.card.highlight').forEach(function(el) { el.classList.remove('highlight'); });
  document.querySelectorAll('.category.collapsed').forEach(function(el) { el.classList.remove('collapsed'); });
  var card = document.getElementById('card-' + name);
  if (card) {
    card.classList.add('highlight');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(function() { card.classList.remove('highlight'); }, 3000);
  }
}

// Filters
document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

// Search
var searchInput = document.getElementById('searchInput');
var searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', function() {
  var q = searchInput.value.toLowerCase().trim();
  if (!q) { searchResults.classList.remove('active'); return; }

  var scored = DATA.map(function(d) {
    var score = 0;
    var words = q.split(/\s+/);
    words.forEach(function(w) {
      if (d.name.toLowerCase().indexOf(w) !== -1) score += 10;
      if (d.keywords && d.keywords.indexOf(w) !== -1) score += 5;
      if (d.desc && d.desc.toLowerCase().indexOf(w) !== -1) score += 3;
      if (d.tags && d.tags.some(function(t) { return t.indexOf(w) !== -1; })) score += 4;
    });
    return { name: d.name, type: d.type, desc: d.desc, isOrchestrator: d.isOrchestrator, score: score };
  }).filter(function(d) { return d.score > 0; }).sort(function(a, b) { return b.score - a.score; }).slice(0, 8);

  if (scored.length === 0) {
    searchResults.innerHTML = '<div class="sr-no-match">No matching tool found for "' + searchInput.value + '"<strong>Consider creating a new skill</strong></div>';
  } else {
    searchResults.innerHTML = scored.map(function(d) {
      var bc = d.isOrchestrator ? 'badge-orchestrator' : d.type === 'agent' ? 'badge-agent' : d.type === 'mcp' ? 'badge-mcp' : 'badge-skill';
      var desc = (d.desc || '').substring(0, 120);
      return '<div class="search-result-item" onclick="selectResult(\'' + d.name + '\')">' +
        '<span class="sr-name">/' + d.name + '</span><span class="sr-type ' + bc + '">' + (d.isOrchestrator ? 'orchestrator' : d.type) + '</span>' +
        '<div class="sr-desc">' + desc + (desc.length >= 120 ? '...' : '') + '</div></div>';
    }).join('');
  }
  searchResults.classList.add('active');
});

searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { searchResults.classList.remove('active'); searchInput.blur(); }
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrapper')) searchResults.classList.remove('active');
});

function selectResult(name) {
  searchResults.classList.remove('active');
  searchInput.value = '';
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('[data-filter="all"]').classList.add('active');
  render('all');
  setTimeout(function() { highlightCard(name); }, 100);
}

// === CONNECT MODAL (serve mode only) ===
var _connectItem = null;

function openConnectModal(name, type) {
  if (typeof SERVE_MODE === 'undefined' || !SERVE_MODE) return;
  _connectItem = { name: name, type: type };
  document.getElementById('connectTitle').textContent = 'Connect /' + name;
  document.getElementById('connectSubtitle').textContent = type + ' — choose which tools should have access';

  // Fetch current connections
  fetch('/api/connections?name=' + encodeURIComponent(name) + '&type=' + encodeURIComponent(type))
    .then(function(r) { return r.json(); })
    .then(function(connections) { renderToolList(connections); });

  document.getElementById('connectModal').classList.add('active');
}

function closeConnectModal() {
  document.getElementById('connectModal').classList.remove('active');
  _connectItem = null;
}

// Close on backdrop click
document.getElementById('connectModal').addEventListener('click', function(e) {
  if (e.target === this) closeConnectModal();
});

function renderToolList(connections) {
  var list = document.getElementById('connectToolList');
  var tools = Object.keys(PROVIDER_ICONS);
  list.innerHTML = tools.map(function(tool) {
    var pi = PROVIDER_ICONS[tool];
    var conn = connections[tool] || {};
    var btnText, btnClass, btnAction, disabled;

    if (!conn.supported) {
      btnText = 'N/A';
      btnClass = '';
      disabled = 'disabled';
      btnAction = '';
    } else if (conn.connected) {
      btnText = 'Connected';
      btnClass = 'connected';
      disabled = '';
      btnAction = 'onclick="doDisconnect(\'' + tool + '\')" onmouseenter="this.textContent=\'Disconnect\'" onmouseleave="this.textContent=\'Connected\'"';
    } else {
      btnText = 'Connect';
      btnClass = '';
      disabled = '';
      btnAction = 'onclick="doConnect(\'' + tool + '\')"';
    }

    return '<div class="connect-tool-row">' +
      '<div class="connect-tool-info">' +
        '<span class="connect-tool-icon" style="background:' + pi.color + '22">' + pi.icon + '</span>' +
        '<div><div class="connect-tool-name">' + pi.label + '</div>' +
          '<div class="connect-tool-status">' + (conn.connected ? (conn.isSymlink ? 'symlink' : 'copy') : (conn.supported ? 'not connected' : 'not supported for this type')) + '</div>' +
        '</div>' +
      '</div>' +
      '<button class="connect-action-btn ' + btnClass + '" ' + disabled + ' ' + btnAction + '>' + btnText + '</button>' +
    '</div>';
  }).join('');
}

function doConnect(tool) {
  if (!_connectItem) return;
  fetch('/api/connect', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: _connectItem.name, tool: tool, type: _connectItem.type })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result.ok) {
      showToast(result.message + ' (' + (result.method || 'done') + ')');
      openConnectModal(_connectItem.name, _connectItem.type); // refresh
    } else {
      showToast('Error: ' + result.error);
    }
  })
  .catch(function(e) { showToast('Error: ' + e.message); });
}

function doDisconnect(tool) {
  if (!_connectItem) return;
  fetch('/api/disconnect', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: _connectItem.name, tool: tool, type: _connectItem.type })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result.ok) {
      showToast(result.message);
      openConnectModal(_connectItem.name, _connectItem.type); // refresh
    } else {
      showToast('Error: ' + result.error);
    }
  })
  .catch(function(e) { showToast('Error: ' + e.message); });
}

function showToast(msg) {
  var t = document.getElementById('connectToast');
  t.textContent = msg;
  t.classList.add('active');
  setTimeout(function() { t.classList.remove('active'); }, 3000);
}

// Apply serve mode class to body
if (typeof SERVE_MODE !== 'undefined' && SERVE_MODE) {
  document.body.classList.add('serve-mode');
}

render();
</script>
